<!DOCTYPE html>
<html>
<head>
  <title>学校SNS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>学校SNS</h1>
<p style="color: gray;">※これはAIで作りました</p>

<div id="login">
  <input id="user" placeholder="ユーザー名">
  <input id="pass" type="password" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
</div>

<div id="app" style="display:none;">
  <button onclick="logout()">ログアウト</button>

  <h2>投稿</h2>
  <input id="postText">
  <button onclick="post()">投稿</button>

  <h2>タイムライン</h2>
  <div id="timeline"></div>

  <h2>グループ作成</h2>
  <input id="groupName">
  <button onclick="createGroup()">作る</button>

  <h2>時間割・持ち物・課題</h2>
  <textarea placeholder="クラス1〜4を書いてOK"></textarea>
</div>

<script src="app.js"></script>
</body>
</html>
